services:
  - type: web
    name: school-portal
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --bind 0.0.0.0:$PORT --timeout 120
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin2024
      - key: DATABASE_URL
        fromDatabase:
          name: school-portal-db
          property: connectionString
      - key: RENDER
        value: "true"
      - key: FLASK_DEBUG
        value: "0"

databases:
  - name: school-portal-db
    plan: free
